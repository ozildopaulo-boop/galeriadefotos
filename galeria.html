<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galeria - Luz da Natureza</title>
    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background-image: url('../natureza.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            padding: 30px;
        }

        /* OVERLAY */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* VOLTAR */
        .voltar {
            display: inline-block;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            margin-bottom: 30px;
            font-size: 1rem;
            letter-spacing: 2px;
            transition: all 0.3s;
            border-bottom: 1px solid transparent;
        }

        .voltar:hover {
            color: white;
            border-bottom-color: rgba(255, 255, 255, 0.3);
        }

        /* TÍTULO */
        .container h1 {
            color: white;
            font-weight: 300;
            font-size: 2.5rem;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }

        .container .sub {
            color: rgba(255, 255, 255, 0.5);
            font-style: italic;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        /* GRADE DE FOTOS */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .grid .foto {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s ease;
            cursor: pointer;
        }

        .grid .foto:hover {
            transform: translateY(-6px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .grid .foto img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        .grid .foto .info {
            padding: 12px 16px;
        }

        .grid .foto .info h4 {
            color: white;
            font-weight: 300;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .grid .foto .info .preco {
            color: #a8d5a2;
            font-weight: 600;
            font-size: 1rem;
        }

        /* QUANDO NÃO TIVER FOTOS */
        .sem-fotos {
            grid-column: 1/-1;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            padding: 60px 20px;
            font-style: italic;
            font-size: 1.2rem;
        }

        /* RESPONSIVO */
        @media (max-width: 600px) {
            body {
                padding: 15px;
            }

            .container h1 {
                font-size: 1.8rem;
            }

            .grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 12px;
            }

            .grid .foto img {
                height: 130px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="voltar">← Voltar</a>
        <h1>📸 Galeria</h1>
        <p class="sub">Clique em uma foto para ver os detalhes</p>

        <div class="grid" id="gridGaleria">
            <!-- As fotos aparecerão aqui -->
        </div>
    </div>

    <script>
        // ============================================
        // CARREGAR FOTOS DO localStorage
        // ============================================

        function carregarGaleria() {
            const dados = localStorage.getItem('atelieFotos');
            let fotos = [];

            if (dados) {
                fotos = JSON.parse(dados);
            }

            const grid = document.getElementById('gridGaleria');

            if (fotos.length === 0) {
                grid.innerHTML = `
                    <div class="sem-fotos">
                        🌿 Nenhuma foto no acervo ainda.<br>
                        <span style="font-size:0.8rem;">A artista está preparando novidades em breve.</span>
                    </div>
                `;
                return;
            }

            grid.innerHTML = fotos.map(foto => `
                <div class="foto" onclick="abrirModal('${foto.id}')">
                    <img src="${foto.imagem}" alt="${foto.titulo}" loading="lazy" />
                    <div class="info">
                        <h4>${foto.titulo}</h4>
                        <span class="preco">R$ ${foto.preco}</span>
                    </div>
                </div>
            `).join('');
        }

        // ============================================
        // ABRIR MODAL (OPCIONAL - SIMPLES)
        // ============================================

        function abrirModal(id) {
            const dados = localStorage.getItem('atelieFotos');
            if (!dados) return;

            const fotos = JSON.parse(dados);
            const foto = fotos.find(f => f.id == id);
            if (!foto) return;

            // Cria um modal simples
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0; left: 0;
                width: 100%; height: 100%;
                background: rgba(0,0,0,0.85);
                backdrop-filter: blur(15px);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 999;
                padding: 20px;
                animation: fadeIn 0.3s ease;
            `;

            modal.innerHTML = `
                <div style="
                    background: rgba(30,30,30,0.95);
                    max-width: 700px;
                    width: 100%;
                    border-radius: 16px;
                    overflow: hidden;
                    border: 1px solid rgba(255,255,255,0.05);
                    position: relative;
                ">
                    <button onclick="this.closest('div').remove()" style="
                        position: absolute;
                        top: 12px; right: 16px;
                        background: none;
                        border: none;
                        color: rgba(255,255,255,0.5);
                        font-size: 1.8rem;
                        cursor: pointer;
                        z-index: 10;
                        transition: all 0.3s;
                    " onmouseover="this.style.color='white'" onmouseout="this.style.color='rgba(255,255,255,0.5)'">✕</button>
                    
                    <img src="${foto.imagem}" alt="${foto.titulo}" style="
                        width: 100%;
                        max-height: 400px;
                        object-fit: cover;
                        display: block;
                    ">
                    
                    <div style="padding: 25px;">
                        <h2 style="color: white; font-weight: 300; font-size: 1.6rem; margin-bottom: 8px;">${foto.titulo}</h2>
                        ${foto.especie ? `<p style="color: rgba(255,255,255,0.6); margin-bottom: 4px;">🐦 ${foto.especie}</p>` : ''}
                        ${foto.local ? `<p style="color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 12px;">📍 ${foto.local}</p>` : ''}
                        ${foto.descricao ? `<p style="color: rgba(255,255,255,0.7); line-height: 1.6; font-style: italic; border-left: 3px solid #2d4a22; padding-left: 16px; margin: 12px 0;">"${foto.descricao}"</p>` : ''}
                        <div style="display: flex; align-items: center; gap: 15px; margin-top: 15px; flex-wrap: wrap;">
                            <span style="color: #a8d5a2; font-size: 1.6rem; font-weight: 700;">R$ ${foto.preco}</span>
                            <button onclick="alert('🛒 ${foto.titulo} adicionada ao carrinho! (Em breve)')" style="
                                background: #2d4a22;
                                color: white;
                                border: none;
                                padding: 10px 28px;
                                border-radius: 30px;
                                cursor: pointer;
                                font-size: 0.95rem;
                                transition: all 0.3s;
                            " onmouseover="this.style.background='#3a6030'" onmouseout="this.style.background='#2d4a22'">
                                🛒 Quero essa foto
                            </button>
                        </div>
                    </div>
                </div>
            `;

            document.body.appendChild(modal);

            // Fecha modal ao clicar fora
            modal.addEventListener('click', function(e) {
                if (e.target === this) this.remove();
            });
        }

        // ============================================
        // INICIAR
        // ============================================

        document.addEventListener('DOMContentLoaded', carregarGaleria);
    </script>

</body>
</html>
