<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luz da Natureza</title>
    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* FUNDO COM NATUREZA.PNG */
        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            height: 100vh;
            width: 100vw;
            background-image: url('../natureza.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* OVERLAY SUAVE PARA O TEXTO FICAR LEGÍVEL */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            z-index: 1;
        }

        /* CONTEÚDO CENTRALIZADO */
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px;
            max-width: 600px;
        }

        /* TÍTULO PRINCIPAL */
        .container h1 {
            font-size: 4.5rem;
            font-weight: 300;
            color: #ffffff;
            letter-spacing: 6px;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.6);
            margin-bottom: 20px;
            font-family: 'Georgia', serif;
        }

        /* LINHA DECORATIVA */
        .linha {
            width: 80px;
            height: 2px;
            background: rgba(255, 255, 255, 0.4);
            margin: 0 auto 30px;
        }

        /* SUBTÍTULO / FRASE */
        .container .subtitulo {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
            letter-spacing: 3px;
            font-weight: 300;
            margin-bottom: 40px;
            font-style: italic;
        }

        /* BOTÃO - IGUALZINHO AO EXEMPLO */
        .btn-galeria {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #ffffff;
            padding: 16px 48px;
            font-size: 1.1rem;
            font-family: 'Georgia', serif;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.4s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            font-weight: 300;
        }

        .btn-galeria:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* PEQUENO TEXTO RODAPÉ (OPCIONAL) */
        .footer-text {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.75rem;
            letter-spacing: 2px;
            z-index: 2;
            font-family: 'Arial', sans-serif;
        }

        /* RESPONSIVO */
        @media (max-width: 768px) {
            .container h1 {
                font-size: 2.8rem;
                letter-spacing: 4px;
            }

            .btn-galeria {
                padding: 14px 32px;
                font-size: 1rem;
            }

            .container .subtitulo {
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .container h1 {
                font-size: 2.2rem;
                letter-spacing: 2px;
            }

            .btn-galeria {
                padding: 12px 24px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="container">
        <h1>LUZ DA NATUREZA</h1>
        <div class="linha"></div>
        <p class="subtitulo">"A beleza está nos detalhes"</p>
        <button class="btn-galeria" onclick="window.location.href='galeria.html'">
            🌿 Clique para mais imagens
        </button>
    </div>

    <!-- RODAPÉ SUTIL -->
    <div class="footer-text">Fotografia • Natureza • Alma</div>

</body>
</html>
