<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luz da Natureza</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            height: 100vh;
            width: 100vw;
            background-image: url('natureza.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Overlay suave para legibilidade */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.30);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px;
            max-width: 700px;
        }

        .container h1 {
            font-size: 5rem;
            font-weight: 300;
            color: #ffffff;
            letter-spacing: 8px;
            text-shadow: 0 4px 40px rgba(0, 0, 0, 0.5);
            margin-bottom: 15px;
            font-family: 'Georgia', serif;
        }

        .linha {
            width: 100px;
            height: 2px;
            background: rgba(255, 255, 255, 0.3);
            margin: 0 auto 25px;
        }

        .container .subtitulo {
            color: rgba(255, 255, 255, 0.75);
            font-size: 1.15rem;
            letter-spacing: 4px;
            font-weight: 300;
            margin-bottom: 40px;
            font-style: italic;
        }

        .btn-galeria {
            background: rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.20);
            color: #ffffff;
            padding: 18px 52px;
            font-size: 1.1rem;
            font-family: 'Georgia', serif;
            letter-spacing: 3px;
            cursor: pointer;
            border-radius: 60px;
            transition: all 0.4s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            font-weight: 300;
            text-decoration: none;
            display: inline-block;
        }

        .btn-galeria:hover {
            background: rgba(255, 255, 255, 0.20);
            transform: scale(1.05);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .footer-text {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.20);
            font-size: 0.75rem;
            letter-spacing: 2px;
            z-index: 2;
            font-family: 'Arial', sans-serif;
        }

        @media (max-width: 768px) {
            .container h1 {
                font-size: 3.2rem;
                letter-spacing: 5px;
            }
            .btn-galeria {
                padding: 14px 35px;
                font-size: 1rem;
            }
            .container .subtitulo {
                font-size: 0.95rem;
            }
        }

        @media (max-width: 480px) {
            .container h1 {
                font-size: 2.4rem;
                letter-spacing: 3px;
            }
            .btn-galeria {
                padding: 12px 28px;
                font-size: 0.9rem;
            }
            .container .subtitulo {
                font-size: 0.85rem;
                letter-spacing: 2px;
            }
            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>LUZ DA NATUREZA</h1>
        <div class="linha"></div>
        <p class="subtitulo">"A beleza está nos detalhes que a natureza esconde"</p>
        <a href="site/" class="btn-galeria">
            🌿 Clique para mais imagens
        </a>
    </div>

    <div class="footer-text">Fotografia • Natureza • Alma</div>

</body>
</html>
